<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Drip Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">DRIP SHOP</span>
    <div class="nav-right">
      <button id="themeToggle" onclick="toggleTheme()">
        <span class="toggle-icon">☀️</span>
        <span class="toggle-label">LIGHT</span>
      </button>
      <span class="nav-tag">ADMIN PANEL</span>
    </div>
  </nav>

  <div class="container">

    <h2 class="section-heading"><span class="accent">//</span> ADD PRODUCT</h2>

    <form id="addForm" enctype="multipart/form-data">
      <input  type="text"   id="name"        placeholder="Product name"  required />
      <textarea             id="description" placeholder="Description"   required></textarea>
      <input  type="number" id="price"       placeholder="Price (KES)"   step="0.01" required />

      <div class="upload-area" id="uploadArea">
        <input type="file" id="imageFile" accept="image/*" />
        <span class="upload-icon">📷</span>
        <p><span>Click to upload</span> a product image</p>
      </div>

      <div id="imagePreviewWrap">
        <img id="imagePreview" src="" alt="Preview" />
        <button type="button" id="removeImage">✕ Remove image</button>
      </div>

      <button type="submit" class="btn-primary">ADD PRODUCT</button>
    </form>

    <div id="status"></div>

    <h2 class="section-heading"><span class="accent">//</span> ALL PRODUCTS</h2>

    <div class="admin-toolbar">
      <div class="search-wrap admin-search">
        <input type="search" id="searchInput" placeholder="SEARCH PRODUCTS..."
               oninput="filterTable()" autocomplete="off" />
        <span class="search-icon">🔍</span>
      </div>
      <p class="table-count" id="tableCount"></p>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Description</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productTableBody">
          <tr><td colspan="5">— NO PRODUCTS YET —</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- Edit Modal -->
  <div id="modalOverlay">
    <div id="modal">
      <p class="modal-title">EDIT PRODUCT</p>
      <form id="editForm">
        <input type="hidden" id="editId" />
        <input type="text"   id="editName"        placeholder="Product name" required />
        <textarea            id="editDescription" placeholder="Description"  required></textarea>
        <input type="number" id="editPrice"        placeholder="Price (KES)" step="0.01" required />
        <input type="text"   id="editImage"        placeholder="Image path"  required />
        <div class="modal-actions">
          <button type="submit">SAVE CHANGES</button>
          <button type="button" class="btn-cancel" onclick="closeModal()">CANCEL</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API  = "https://kevinmk.infinityfree.me/products.php";
    const BASE = "https://kevinmk.infinityfree.me";

    // ── Theme ─────────────────────────────────────────────────────────────────
    applyTheme(localStorage.getItem("drip-theme") || "dark");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      const btn = document.getElementById("themeToggle");
      btn.querySelector(".toggle-icon").textContent  = theme === "light" ? "☀️" : "🌙";
      btn.querySelector(".toggle-label").textContent = theme === "light" ? "LIGHT" : "DARK";
    }

    function toggleTheme() {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      localStorage.setItem("drip-theme", next);
      applyTheme(next);
    }

    // ── Status ────────────────────────────────────────────────────────────────
    function showStatus(message, type = "success") {
      const el = document.getElementById("status");
      el.textContent   = message;
      el.className     = type;
      el.style.display = "block";
      setTimeout(() => { el.className = ""; el.style.display = "none"; }, 4000);
    }

    // ── Image preview ─────────────────────────────────────────────────────────
    document.getElementById("imageFile").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById("imagePreview").src = e.target.result;
        document.getElementById("imagePreviewWrap").style.display = "block";
        document.getElementById("uploadArea").style.display = "none";
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("removeImage").addEventListener("click", function () {
      document.getElementById("imageFile").value = "";
      document.getElementById("imagePreview").src = "";
      document.getElementById("imagePreviewWrap").style.display = "none";
      document.getElementById("uploadArea").style.display = "block";
    });

    // ── Search & filter ───────────────────────────────────────────────────────
    let allProducts = [];

    function highlight(text, query) {
      if (!query) return text;
      return text.replace(new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'),
        '<mark class="highlight">$1</mark>');
    }

    function filterTable() {
      const query   = document.getElementById("searchInput").value.trim().toLowerCase();
      const countEl = document.getElementById("tableCount");
      const tbody   = document.getElementById("productTableBody");

      const filtered = query
        ? allProducts.filter(p =>
            p.name.toLowerCase().includes(query) ||
            p.description.toLowerCase().includes(query) ||
            String(p.price).includes(query))
        : allProducts;

      countEl.innerHTML = query
        ? `<span>${filtered.length}</span> / ${allProducts.length} products`
        : `<span>${allProducts.length}</span> product${allProducts.length !== 1 ? "s" : ""}`;

      tbody.innerHTML = "";

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;font-family:var(--font-mono);font-size:0.8rem;letter-spacing:2px;color:var(--text-muted);">NO RESULTS FOR "${query.toUpperCase()}"</td></tr>`;
        return;
      }

      filtered.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><img src="${BASE}/${p.image}" alt="${p.name}"
               onerror="this.src='https://placehold.co/54x54/1a1a1a/444?text=?'" /></td>
          <td class="td-name">${highlight(p.name, query)}</td>
          <td class="td-desc" title="${p.description}">${highlight(p.description, query)}</td>
          <td class="td-price">KES ${parseFloat(p.price).toLocaleString()}</td>
          <td>
            <div class="action-btns">
              <button class="btn-edit"   onclick="openEditModal(${p.id},'${esc(p.name)}','${esc(p.description)}',${p.price},'${esc(p.image)}')">EDIT</button>
              <button class="btn-delete" onclick="deleteProduct(${p.id})">DELETE</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function esc(str) { return String(str).replace(/'/g, "\\'"); }

    // ── Load products ─────────────────────────────────────────────────────────
    function loadProducts() {
      fetch(API)
        .then(res => { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
        .then(data => { allProducts = Array.isArray(data) ? data : []; filterTable(); })
        .catch(err => showStatus("Failed to load products: " + err.message, "error"));
    }

    // ── Add product ───────────────────────────────────────────────────────────
    document.getElementById("addForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const fileInput = document.getElementById("imageFile");
      if (!fileInput.files[0]) { showStatus("Please select a product image.", "error"); return; }

      const btn = this.querySelector(".btn-primary");
      btn.textContent = "UPLOADING...";
      btn.disabled    = true;

      const formData = new FormData();
      formData.append("name",        document.getElementById("name").value.trim());
      formData.append("description", document.getElementById("description").value.trim());
      formData.append("price",       document.getElementById("price").value);
      formData.append("image",       fileInput.files[0]);

      fetch(API, { method: "POST", body: formData })
        .then(res => res.json())
        .then(data => {
          btn.textContent = "ADD PRODUCT";
          btn.disabled    = false;
          if (data.error) { showStatus(data.error, "error"); return; }
          showStatus("✓ Product added successfully!", "success");
          this.reset();
          document.getElementById("imagePreviewWrap").style.display = "none";
          document.getElementById("uploadArea").style.display       = "block";
          document.getElementById("searchInput").value = "";
          loadProducts();
        })
        .catch(err => {
          btn.textContent = "ADD PRODUCT";
          btn.disabled    = false;
          showStatus("Upload failed: " + err.message, "error");
        });
    });

    // ── Edit modal ────────────────────────────────────────────────────────────
    function openEditModal(id, name, description, price, image) {
      document.getElementById("editId").value          = id;
      document.getElementById("editName").value        = name;
      document.getElementById("editDescription").value = description;
      document.getElementById("editPrice").value       = price;
      document.getElementById("editImage").value       = image;
      document.getElementById("modalOverlay").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("open");
      document.getElementById("editForm").reset();
    }

    document.getElementById("modalOverlay").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    document.getElementById("editForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      const payload = {
        name:        document.getElementById("editName").value.trim(),
        description: document.getElementById("editDescription").value.trim(),
        price:       parseFloat(document.getElementById("editPrice").value),
        image:       document.getElementById("editImage").value.trim()
      };
      fetch(API + "?id=" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) { showStatus(data.error, "error"); return; }
          showStatus("✓ " + data.message, "success");
          closeModal();
          loadProducts();
        })
        .catch(() => showStatus("Failed to update product.", "error"));
    });

    // ── Delete ────────────────────────────────────────────────────────────────
    function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;
      fetch(API + "?id=" + id, { method: "DELETE" })
        .then(res => res.json())
        .then(data => {
          if (data.error) { showStatus(data.error, "error"); return; }
          showStatus("✓ " + data.message, "success");
          loadProducts();
        })
        .catch(() => showStatus("Failed to delete product.", "error"));
    }

    loadProducts();
  </script>

</body>
</html>
